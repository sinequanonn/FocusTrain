global:
  scrape_interval: 15s          # 15초마다 메트릭 수집
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'focustrain-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']    # 로컬 테스트용
        labels:
          application: 'focustrain-backend'
          env: 'local'
